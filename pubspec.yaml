name: lockd2
description: Lockd 2.3.0 dynamic lock controller
publish_to: "none"
version: 2.3.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  local_auth: ^2.2.0
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.3
  path: ^1.9.0
  file_picker: ^8.0.0
  home_widget: ^0.9.2
  workmanager: ^0.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
